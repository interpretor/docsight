# DEPRECATED: The fabianbees/breitbandmessung image has been discontinued
# and is no longer available. This file is kept as a reference for the
# sidecar integration pattern. See https://github.com/itsDNNS/docsight/discussions/142
# for community replacement options.
#
# The DOCSight side of the integration (file watcher) still works. Any sidecar
# container that writes BNetzA CSV files to a shared volume can use the same
# BNETZ_WATCH_ENABLED / BNETZ_WATCH_DIR environment variables shown below.
#
# Original description:
# Optional addon: BNetzA automated measurement sidecar
# Usage: docker compose -f docker-compose.yml -f docker-compose.bnetz.yml up -d

services:
  docsight:
    volumes:
      - bnetz_data:/data/bnetz
    environment:
      - BNETZ_WATCH_ENABLED=true
      - BNETZ_WATCH_DIR=/data/bnetz

  breitbandmessung:
    image: fabianbees/breitbandmessung:latest
    container_name: breitbandmessung
    restart: unless-stopped
    environment:
      - TZ=Europe/Berlin
      - TIME_START=13:00
      - TIME_END=22:30
    volumes:
      - bnetz_data:/config/xdg/config/Breitbandmessung
    ports:
      - "5800:5800"  # noVNC web UI for initial setup

volumes:
  bnetz_data:
